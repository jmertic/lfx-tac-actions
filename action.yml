name: Update TAC data from LFX
description: Action that syncs data from LFX into the TAC website
inputs:
  landscape_url:
    description: "URL for the project's landscape"
    required: false
    default: ""
  slug:
    description: "Project slug as defined in LFX PCC"
    required: false
    default: ""
  lfx_tac_committee_url:
    description: "URL to the committee in LFX"
    required: false
    default: ""
  tac_agenda_gh_project_url:
    description: "URL for the GitHub Project in the TAC repo for managing TAC meeting agendas"
    required: false
    default: ""
  overview_decks:
    description: "JSON array of Google Presentations to export ( format is '[{'url': GOOGLE-DRIVE-URL,'filename': EXPORT_FILENAME},...]' )"
    required: false
    default: ""
  updateprojects:
    description: "Run updateprojects"
    required: false
    default: 'true'
  updatetacmembers:
    description: "Run updatetacmembers"
    required: false
    default: 'true'
  updatetacagendaitems:
    description: "Run updatetacagendaitems"
    required: false
    default: 'true'
  updateclomonitor:
    description: "Run updateclomonitor"
    required: false
    default: 'false'
  updatecharters:
    description: "Run updatecharters"
    required: false
    default: 'false'
  updatedecks:
    description: "Run updatedecks"
    required: false
    default: 'false'
runs:
  using: composite
  steps:
  - name: Harden Runner
    uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
    with:
      egress-policy: audit
  - name: Check out repo
    uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    with:
      token: ${{ env.token }}
      repository: ${{ env.repository }}
      ref: ${{ env.ref }}
  - name: Install lfx-tac-actions via pipx
    shell: bash
    run: |
      pipx install git+https://github.com/jmertic/lfx-tac-actions.git
  - name: Run updateprojects
    shell: bash
    if: inputs.updateprojects == 'true' && inputs.landscape_url != ''
    run: |
      updateprojects -o _data/projects.csv --landscape_url ${{ inputs.landscape_url }}
  - name: Run updatetacmembers
    shell: bash
    if: inputs.updatetacmembers == 'true' && inputs.lfx_tac_committee_url != ''
    run: |
      updatetacmembers -o _data/tacmembers.csv --lfx_tac_committee_url ${{ inputs.lfx_tac_committee_url }}
  - name: Run updatetacagendaitems
    shell: bash
    if: inputs.updatetacagendaitems == 'true' && inputs.tac_agenda_gh_project_url != ''
    env:
      GH_TOKEN: ${{ env.token }}
    run: |
      updatetacagendaitems -o _data/meeting-agenda-items.csv --tac_agenda_gh_project_url ${{ inputs.tac_agenda_gh_project_url }}
  - name: Run updateclomonitor
    shell: bash
    if: inputs.updateclomonitor == 'true' && inputs.landscape_url != ''
    run: |
      updateclomonitor -o _data/meeting-agenda-items.csv --landscape_url ${{ inputs.landscape_url }}
  - name: Run updatecharters
    shell: bash
    if: inputs.updatecharters == 'true' && inputs.slug != ''
    run: |
      updatecharters -o project_charters --slug ${{ inputs.slug }} -l INFO
  - name: Run updatedecks
    shell: bash
    if: inputs.updatedecks == 'true' && inputs.overview_decks != ''
    run: |
      updatedecks -o overview_deck --overview_decks '${{ inputs.overview_decks }}'
  - name: Get current date
    id: date
    uses: Kaven-Universe/github-action-current-date-time@7c1d8465d1bfd7d35466d2ee82a8e460780561ae # v1.5.0
    with:
      format: "YYYY-MM-DD"
  - name: Create Pull Request
    id: cpr
    uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
    with:
      token: ${{ env.token }}
      branch-suffix: timestamp
      title: "Update Data Sources from LFX ${{ steps.date.outputs.time }}"
      labels: automerge
      commit-message: Update Data Sources from LFX
      signoff: true
      delete-branch: true
  - name: Enable Pull Request Automerge
    if: steps.cpr.outputs.pull-request-number != ''
    shell: bash
    run: |
      gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}" \
      || gh pr merge --squash "${{ steps.cpr.outputs.pull-request-number }}"
    env:
      GH_TOKEN: ${{ env.token }}
